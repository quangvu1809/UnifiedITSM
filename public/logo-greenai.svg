<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <linearGradient id="circuitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0.1"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="185" r="140" fill="url(#circuitGrad)" stroke="#059669" stroke-width="2" opacity="0.3"/>

  <!-- Circuit board lines (AI theme) -->
  <g stroke="#10b981" stroke-width="1.5" opacity="0.25" fill="none">
    <line x1="80" y1="185" x2="130" y2="185"/>
    <line x1="270" y1="185" x2="320" y2="185"/>
    <line x1="200" y1="65" x2="200" y2="95"/>
    <line x1="200" y1="275" x2="200" y2="305"/>
    <circle cx="80" cy="185" r="3" fill="#10b981"/>
    <circle cx="320" cy="185" r="3" fill="#10b981"/>
    <circle cx="200" cy="65" r="3" fill="#10b981"/>
    <circle cx="200" cy="305" r="3" fill="#10b981"/>
    <!-- Diagonal circuits -->
    <line x1="110" y1="105" x2="140" y2="125"/>
    <line x1="290" y1="105" x2="260" y2="125"/>
    <line x1="110" y1="265" x2="140" y2="245"/>
    <line x1="290" y1="265" x2="260" y2="245"/>
    <circle cx="110" cy="105" r="3" fill="#10b981"/>
    <circle cx="290" cy="105" r="3" fill="#10b981"/>
    <circle cx="110" cy="265" r="3" fill="#10b981"/>
    <circle cx="290" cy="265" r="3" fill="#10b981"/>
  </g>

  <!-- Leaf shape (Green theme) -->
  <g transform="translate(200, 155)">
    <!-- Main leaf -->
    <path d="M0,-70 C40,-65 70,-30 70,10 C70,55 35,80 0,90 C-35,80 -70,55 -70,10 C-70,-30 -40,-65 0,-70Z"
          fill="url(#grad1)" opacity="0.9"/>
    <!-- Leaf vein (center) -->
    <line x1="0" y1="-55" x2="0" y2="75" stroke="#fff" stroke-width="2" opacity="0.5"/>
    <!-- Leaf veins (sides) -->
    <line x1="0" y1="-30" x2="30" y2="-15" stroke="#fff" stroke-width="1.2" opacity="0.35"/>
    <line x1="0" y1="-30" x2="-30" y2="-15" stroke="#fff" stroke-width="1.2" opacity="0.35"/>
    <line x1="0" y1="0" x2="40" y2="10" stroke="#fff" stroke-width="1.2" opacity="0.35"/>
    <line x1="0" y1="0" x2="-40" y2="10" stroke="#fff" stroke-width="1.2" opacity="0.35"/>
    <line x1="0" y1="30" x2="35" y2="35" stroke="#fff" stroke-width="1.2" opacity="0.35"/>
    <line x1="0" y1="30" x2="-35" y2="35" stroke="#fff" stroke-width="1.2" opacity="0.35"/>
  </g>

  <!-- Brain/AI nodes inside leaf -->
  <g fill="#fff" opacity="0.7">
    <circle cx="200" cy="120" r="4"/>
    <circle cx="220" cy="145" r="3"/>
    <circle cx="180" cy="145" r="3"/>
    <circle cx="200" cy="165" r="4"/>
    <circle cx="225" cy="175" r="3"/>
    <circle cx="175" cy="175" r="3"/>
    <circle cx="200" cy="200" r="3"/>
    <!-- Node connections -->
    <line x1="200" y1="120" x2="220" y2="145" stroke="#fff" stroke-width="1" opacity="0.5"/>
    <line x1="200" y1="120" x2="180" y2="145" stroke="#fff" stroke-width="1" opacity="0.5"/>
    <line x1="220" y1="145" x2="200" y2="165" stroke="#fff" stroke-width="1" opacity="0.5"/>
    <line x1="180" y1="145" x2="200" y2="165" stroke="#fff" stroke-width="1" opacity="0.5"/>
    <line x1="200" y1="165" x2="225" y2="175" stroke="#fff" stroke-width="1" opacity="0.5"/>
    <line x1="200" y1="165" x2="175" y2="175" stroke="#fff" stroke-width="1" opacity="0.5"/>
    <line x1="225" y1="175" x2="200" y2="200" stroke="#fff" stroke-width="1" opacity="0.5"/>
    <line x1="175" y1="175" x2="200" y2="200" stroke="#fff" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Text: GreenAI -->
  <text x="200" y="340" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="48" font-weight="800" fill="url(#grad1)">
    Green<tspan fill="url(#grad2)" font-weight="900">AI</tspan>
  </text>

  <!-- Subtitle -->
  <text x="200" y="368" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="14" fill="#6b7280" letter-spacing="3">
    INTELLIGENT · SUSTAINABLE
  </text>
</svg>
